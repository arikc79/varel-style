{% extends "admin/change_list.html" %}

{% block result_list %}
{% if totals %}
<div style="display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap;">
  <div style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:16px 24px;min-width:180px;">
    <div style="font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Всього на складі</div>
    <div style="font-size:28px;font-weight:600;color:#fff">{{ totals.stock }} шт</div>
  </div>
  <div style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:16px 24px;min-width:180px;">
    <div style="font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Потенційна виручка</div>
    <div style="font-size:28px;font-weight:600;color:#c9a84c">{{ totals.revenue }}</div>
  </div>
  <div style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:16px 24px;min-width:180px;">
    <div style="font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Загальна собівартість</div>
    <div style="font-size:28px;font-weight:600;color:#e74c3c">{{ totals.cost }}</div>
  </div>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
